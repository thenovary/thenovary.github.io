<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>thenovary - Privacy Policy</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; text-align: center; color: #444; background: #f9f9f9; padding: 50px 20px; }
        .container { max-width: 600px; background: white; margin: 0 auto; padding: 40px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .lang-buttons { margin-bottom: 30px; }
        .btn { border: 1px solid #ddd; background: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; margin: 0 5px; color: #666; font-size: 14px; transition: 0.3s; }
        .btn.active { background: #eee; font-weight: bold; border-color: #bbb; }
        .btn:hover { background: #f5f5f5; }
        h1 { color: #5ba16f; margin-bottom: 10px; transition: 0.3s; }
        #description { margin-bottom: 30px; transition: 0.3s; }
        .app-list { text-align: left; border-top: 1px solid #eee; padding-top: 20px; }
        .app-item { margin-bottom: 15px; font-size: 16px; display: flex; align-items: center; }
        .app-item a { color: #333; text-decoration: none; font-weight: bold; margin-left: 10px; }
        .app-item a:hover { color: #5ba16f; }
    </style>
</head>
<body>
    <div class="container">
        <div class="lang-buttons">
            <button class="btn" onclick="changeLang('en')" id="btn-en">English</button>
            <button class="btn active" onclick="changeLang('ko')" id="btn-ko">한국어</button>
            <button class="btn" onclick="changeLang('jp')" id="btn-jp">日本語</button>
        </div>

        <h1 id="title">thenovary 🍎🦋</h1>
        <p id="description">사용자의 소중한 정보를 안전하게 보호합니다.</p>

        <div class="app-list">
            <div class="app-item">🍎 <a href="./animal.html" id="link-animal">모여봐요 도감 - 개인정보처리방침</a></div>
            <div class="app-item">📚 <a href="./deepread.html" id="link-deepread">딥리드 - 개인정보처리방침</a></div>
            <div class="app-item">📚 <a href="./pommo.html" id="link-deepread">pommo - 개인정보처리방침</a></div>
        </div>
    </div>

    <script>
        const content = {
            en: {
                title: "thenovary 🍎🦋",
                description: "We safely protect your valuable information.",
                animal: "Nookdex - Privacy Policy",
                deepread: "DeepRead - Privacy Policy"
            },
            ko: {
                title: "thenovary 🍎🦋",
                description: "사용자의 소중한 정보를 안전하게 보호합니다.",
                animal: "모여봐요 도감 - 개인정보처리방침",
                deepread: "DeepRead - 개인정보처리방침"
            },
            jp: {
                title: "thenovary 🍎🦋",
                description: "お客様の貴重な情報を安全に保護します。",
                animal: "あつまれ図鑑 - 個人情報処理方針",
                deepread: "DeepRead - 個人情報処理方針"
            }
        };

        function changeLang(lang) {
            // 텍스트 변경
            document.getElementById('title').innerText = content[lang].title;
            document.getElementById('description').innerText = content[lang].description;
            document.getElementById('link-animal').innerText = content[lang].animal;
            document.getElementById('link-deepread').innerText = content[lang].deepread;

            // 버튼 활성화 스타일 변경
            document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + lang).classList.add('active');
        }
    </script>
</body>
</html>
